<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>LifeHQ</title>
    <meta name="description" content="Persönliches Life Operating System" />
    <meta name="theme-color" content="#030303" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="LifeHQ" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/Life-HQ/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/Life-HQ/favicon.svg" />
    <link rel="icon" type="image/svg+xml" href="/Life-HQ/favicon.svg" />
    <script>
      (function () {
        var redirect = window.location.search;

        if (redirect.slice(0, 2) !== '?/') {
          return;
        }

        var route = redirect
          .slice(2)
          .split('&')
          .map(function (part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(null, '', window.location.pathname + route + window.location.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
